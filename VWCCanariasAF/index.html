<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1.0, user-scalable=no" />
  <title>Prueba Chat VW Comerciales Canarias (Agentforce)</title>

  <style>
    /* 1. RESET: Eliminamos márgenes y fijamos el fondo al 100% de la pantalla */
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden; /* Evita cualquier scroll fuera del chat */
      background-color: #ffffff; 
      font-family: Arial, sans-serif;
    }

    /* Ocultamos el texto de fondo */
    .container {
      display: none;
    }

    /* 2. OCULTAMOS EL BOTÓN FLOTANTE ORIGINAL */
    .embeddedServiceHelpButton {
      display: none !important; 
    }

    /* 3. EXPANDIMOS EL WIDGET AL 100% */
    .embeddedServiceSidebar.layout-docked .dockableContainer,
    iframe[title="Embedded Messaging"] {
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100% !important;
      max-height: 100% !important;
      bottom: 0 !important;
      right: 0 !important;
      border-radius: 0 !important;
      border: none !important;
    }
  </style>
</head>

<body>
  
  <div class="container">
    <h1>Prueba Chat VW Comerciales Canarias</h1>
    <p>Cargando Agentforce a pantalla completa...</p>
  </div>

  <script type='text/javascript'>
    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = 'es'; // For example, enter 'en' or 'en-US'

        embeddedservice_bootstrap.init(
          '00D1i000000V9Lj',
          'Agentforce_Chat_Web_VWC',
          'https://domingoalonso.my.site.com/ESWAgentforceChatWebVW1770139831228',
          {
            scrt2URL: 'https://domingoalonso.my.salesforce-scrt.com'
          }
        );
      } catch (err) {
        console.error('Error loading Embedded Messaging: ', err);
      }
    };
  </script>
  <script type='text/javascript'
    src='https://domingoalonso.my.site.com/ESWAgentforceChatWebVW1770139831228/assets/js/bootstrap.min.js'
    onload='initEmbeddedMessaging()'></script>

  <script>
    window.addEventListener("onEmbeddedMessagingReady", () => {
        console.log("El entorno de VW Comerciales está listo. Desplegando el prechat...");
        try {
            // Este comando abrirá el contenedor. Al estar configurado un prechat, 
            // Salesforce mostrará el formulario antes de conectar con Agentforce.
            embeddedservice_bootstrap.utilAPI.launchChat();
        } catch (error) {
            console.error("No se pudo forzar la apertura:", error);
        }
    });
  </script>

</body>

</html>
