<!DOCTYPE html>

  <style>
    /* 1. Limpiamos el fondo de la web */
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden; 
      background-color: #ffffff; 
    }

    .container {
      display: none;
    }

    /* 2. EL HACK DEFINITIVO PARA EL TAMAÑO */
    /* Como esta web solo aloja el chat, forzamos a que cualquier iFrame que inyecte 
       Salesforce ocupe toda la pantalla de forma absoluta y pase por encima de todo. */
    iframe {
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      bottom: 0 !important;
      right: 0 !important;
      border: none !important;
      z-index: 999999 !important; /* Aseguramos que esté por delante de cualquier cosa */
      border-radius: 0 !important;
    }
  </style>
</head>

  			embeddedservice_bootstrap.settings.language = 'es'; // For example, enter 'en' or 'en-US'
  
  			embeddedservice_bootstrap.init(
  				'00DAU00000ImD9j',

  				'https://domingoalonso--devaf.sandbox.my.site.com/ESWAgentforceChatWebVW1767952965941',
  				{
  					scrt2URL: 'https://domingoalonso--devaf.sandbox.my.salesforce-scrt.com'
  				}

  		} catch (err) {
